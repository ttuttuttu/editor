<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-width=1.0">
<title>스킬 컷인 배너 에디터 (프로 버전)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');

    :root {
        --bg-color: #0f0f0f;
        --accent-color: #ff2a2a; 
        --panel-bg: #1a1a1a;
        --border-color: #333;
        
        /* 이미지 조절 변수 */
        --img-scale: 1;
        --img-x: 0%;
        --img-y: 0%;
        
        /* 사선 그림자 조절 변수 */
        --slash-angle: 15deg;
        --slash-pos: 45%;
    }

    body {
        background-color: var(--bg-color);
        color: #fff;
        font-family: 'Noto Sans KR', sans-serif;
        margin: 0; padding: 0;
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* ------------------------------
       [미리보기 영역]
    ------------------------------ */
    .preview-section {
        width: 100%; background-color: #000; padding: 20px 0;
        display: flex; justify-content: center; border-bottom: 2px solid var(--border-color);
    }
    .preview-wrapper { width: 100%; max-width: 900px; position: relative; transform-origin: top center; }
    
    #capture-area {
        width: 900px; height: 300px; position: relative;
        background-color: #111; overflow: hidden;
    }

    /* 1. 풀사이즈 이미지 영역 (수정됨: 잘림 방지 로직 적용) */
    .img-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        overflow: hidden;
    }
    .bg-image {
        position: absolute;
        top: 50%; left: 50%;
        /* 컨테이너 크기보다 무조건 크거나 같게 설정하여 여백 방지 */
        min-width: 100%; min-height: 100%;
        width: auto; height: auto;
        /* 사진의 중심을 기준으로 잡고 X, Y를 이동 */
        transform: translate(calc(-50% + var(--img-x)), calc(-50% + var(--img-y))) scale(var(--img-scale));
        display: none; 
    }
    .bg-placeholder {
        position: absolute; width: 100%; height: 100%;
        background: repeating-linear-gradient(45deg, #2a2a2a 25%, transparent 25%, transparent 75%, #2a2a2a 75%, #2a2a2a), repeating-linear-gradient(45deg, #2a2a2a 25%, #222 25%, #222 75%, #2a2a2a 75%, #2a2a2a);
        background-position: 0 0, 10px 10px; background-size: 20px 20px;
    }

    /* 2. 사선 그림자 마스크 */
    .slash-container {
        position: absolute; top: 50%; left: var(--slash-pos);
        width: 0; height: 200%;
        transform: translate(0, -50%) rotate(var(--slash-angle));
        z-index: 2; pointer-events: none;
    }
    .mask-bg {
        position: absolute; top: -50%; right: 0;
        width: 2000px; height: 200%;
        background-color: rgba(12, 12, 12, 0.95);
        box-shadow: 15px 0 60px 40px rgba(12, 12, 12, 0.95);
    }

    /* 3. 스피드 라인 (집중선) */
    .speed-lines {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: repeating-linear-gradient(90deg, transparent, transparent 150px, rgba(255,255,255,0.03) 150px, rgba(255,255,255,0.03) 152px);
        transform: skewX(-15deg); z-index: 3; pointer-events: none;
    }

    /* 4. 텍스트 요소 */
    .text-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10; padding: 40px 50px; box-sizing: border-box;
        display: flex; flex-direction: column; justify-content: space-between;
        pointer-events: none;
    }
    .quote-text {
        font-size: 32px; font-weight: 900; font-style: italic; color: #fff;
        text-shadow: 3px 3px 0px #000, 5px 5px 15px rgba(0,0,0,0.8);
        max-width: 60%; line-height: 1.3;
    }
    .skill-info { display: flex; flex-direction: column; gap: 5px; }
    
    .char-info-text {
        font-size: 16px; font-weight: 700; letter-spacing: 3px; color: #aaa;
        display: flex; align-items: center; gap: 10px;
    }
    .char-info-text::before {
        content: ''; display: inline-block; width: 20px; height: 2px;
        background-color: var(--accent-color); 
    }
    
    .skill-name-text {
        font-family: 'Black Han Sans', sans-serif; font-size: 56px; 
        color: var(--accent-color); 
        text-shadow: 2px 2px 0px #000, 4px 4px 0px #333; letter-spacing: -1px; line-height: 1;
    }

    /* ------------------------------
       [컨트롤 패널 영역]
    ------------------------------ */
    .control-section { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
    .control-group {
        background-color: var(--panel-bg); border: 1px solid var(--border-color);
        padding: 15px; margin-bottom: 15px; border-radius: 8px;
    }
    .group-title {
        font-size: 15px; color: #aaa; font-weight: bold; margin-bottom: 15px;
        border-bottom: 1px dashed var(--border-color); padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center;
    }
    
    .input-row { margin-bottom: 15px; }
    .input-row:last-child { margin-bottom: 0; }
    label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #ccc; margin-bottom: 5px; font-weight: bold; }
    
    input[type="text"], textarea {
        width: 100%; background-color: #000; border: 1px solid var(--border-color);
        color: #fff; padding: 10px; box-sizing: border-box; border-radius: 4px; resize: vertical;
    }
    input[type="text"]:focus, textarea:focus { outline: none; border-color: #666; }
    
    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type="range"] { flex: 1; accent-color: #888; }
    .val-display { font-size: 12px; color: #888; width: 45px; text-align: right; }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: #555; cursor: pointer; }

    .save-btn {
        width: 100%; background-color: #fff; color: #000; border: none;
        padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s;
    }
    .save-btn:hover { background-color: #ccc; }
    #file-input { display: none; }

</style>
</head>
<body>

<div class="preview-section">
    <div class="preview-wrapper" id="preview-wrapper">
        <div id="capture-area">
            
            <div class="img-container">
                <div class="bg-placeholder" id="placeholder"></div>
                <img class="bg-image" id="uploaded-img" src="" alt="bg">
            </div>

            <div class="slash-container">
                <div class="mask-bg"></div>
            </div>
            
            <div class="speed-lines"></div>

            <div class="text-container">
                <div class="quote-text" id="out-quote">"이 정도로 끝날 거라 생각했다면,<br>단단히 착각한 거야."</div>
                <div class="skill-info">
                    <div class="char-info-text" id="out-info">S-CLASS SENTINEL // 한도윤</div>
                    <div class="skill-name-text" id="out-skill">공간 제어 : 한계 돌파</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="control-section">
    
    <div class="control-group">
        <div class="group-title">
            <span>📷 이미지 조정 (IMAGE POSITION)</span>
            <button onclick="document.getElementById('file-input').click()" style="padding: 5px 10px; background:#333; color:#fff; border:none; border-radius:4px; cursor:pointer;">사진 업로드</button>
            <input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">
        </div>
        <div class="input-row slider-row">
            <label style="min-width: 70px;">확대(Zoom)</label>
            <input type="range" id="in-img-scale" min="0.5" max="3" step="0.05" value="1">
            <span class="val-display" id="val-img-scale">1.0x</span>
        </div>
        <div class="input-row slider-row">
            <label style="min-width: 70px;">가로 이동</label>
            <input type="range" id="in-img-x" min="-100" max="100" value="0">
            <span class="val-display" id="val-img-x">0%</span>
        </div>
        <div class="input-row slider-row">
            <label style="min-width: 70px;">세로 이동</label>
            <input type="range" id="in-img-y" min="-100" max="100" value="0">
            <span class="val-display" id="val-img-y">0%</span>
        </div>
    </div>

    <div class="control-group">
        <div class="group-title">🎨 디자인 & 마스크 (DESIGN & MASK)</div>
        <div class="input-row" style="display: flex; gap: 15px; border-bottom: 1px dashed #333; padding-bottom: 15px;">
            <div style="flex: 1;">
                <label>텍스트 강조 색상 (선택 / HEX 입력)</label>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <input type="color" id="in-color" value="#ff2a2a" style="width: 40px; height: 35px; cursor: pointer; background: none; border: none; padding: 0;">
                    <input type="text" id="in-hex" value="#ff2a2a" maxlength="7" style="flex: 1; padding: 5px; font-family: monospace;">
                </div>
            </div>
        </div>
        <div class="input-row slider-row" style="margin-top: 15px;">
            <div style="flex: 1;">
                <label>사선 각도</label>
                <div class="slider-row"><input type="range" id="in-slash-angle" min="-60" max="60" value="15"><span class="val-display" id="val-angle">15°</span></div>
            </div>
            <div style="flex: 1;">
                <label>마스크 위치</label>
                <div class="slider-row"><input type="range" id="in-slash-pos" min="-10" max="110" value="45"><span class="val-display" id="val-pos">45%</span></div>
            </div>
        </div>
    </div>

    <div class="control-group">
        <div class="group-title">📝 텍스트 데이터 (TEXT DATA)</div>
        <div class="input-row" style="padding-bottom: 15px; border-bottom: 1px dashed #333;">
            <label><input type="checkbox" id="toggle-quote" checked> 캐릭터 대사</label>
            <textarea id="in-quote" rows="2">"이 정도로 끝날 거라 생각했다면,&#13;&#10;단단히 착각한 거야."</textarea>
            <div class="slider-row" style="margin-top: 8px;">
                <label style="min-width: 50px;">크기</label>
                <input type="range" id="in-quote-size" min="20" max="60" value="32"><span class="val-display" id="val-quote-size">32px</span>
            </div>
        </div>

        <div class="input-row" style="padding-bottom: 15px; border-bottom: 1px dashed #333;">
            <label><input type="checkbox" id="toggle-info" checked> 소속 및 이름</label>
            <input type="text" id="in-info" value="S-CLASS SENTINEL // 한도윤">
            <div class="slider-row" style="margin-top: 8px;">
                <label style="min-width: 50px;">크기</label>
                <input type="range" id="in-info-size" min="10" max="30" value="16"><span class="val-display" id="val-info-size">16px</span>
            </div>
        </div>

        <div class="input-row">
            <label><input type="checkbox" id="toggle-skill" checked> 스킬명</label>
            <input type="text" id="in-skill" value="공간 제어 : 한계 돌파">
            <div class="slider-row" style="margin-top: 8px;">
                <label style="min-width: 50px;">크기</label>
                <input type="range" id="in-skill-size" min="30" max="90" value="56"><span class="val-display" id="val-skill-size">56px</span>
            </div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <button class="save-btn" onclick="saveAsImage()">[ 스킬 컷인 짤 저장하기 ]</button>
    </div>
</div>

<script>
    function scalePreview() {
        const wrapper = document.getElementById('preview-wrapper');
        const captureArea = document.getElementById('capture-area');
        const scale = Math.min(wrapper.clientWidth / 900, 1);
        captureArea.style.transform = `scale(${scale})`;
        wrapper.style.height = `${300 * scale}px`;
    }
    window.addEventListener('resize', scalePreview);
    scalePreview();

    const root = document.documentElement;
    
    const syncVar = (inputId, displayId, varName, unit) => {
        const input = document.getElementById(inputId);
        const display = document.getElementById(displayId);
        input.addEventListener('input', (e) => {
            root.style.setProperty(varName, `${e.target.value}${unit}`);
            display.innerText = `${e.target.value}${unit === '' ? 'x' : unit}`;
        });
    };
    
    const syncText = (inputId, outputId) => {
        document.getElementById(inputId).addEventListener('input', (e) => {
            document.getElementById(outputId).innerHTML = e.target.value.replace(/\n/g, '<br>');
        });
    };

    const syncDisplay = (toggleId, outputId) => {
        document.getElementById(toggleId).addEventListener('change', (e) => {
            document.getElementById(outputId).style.display = e.target.checked ? 'block' : 'none';
        });
    };

    syncVar('in-img-scale', 'val-img-scale', '--img-scale', '');
    syncVar('in-img-x', 'val-img-x', '--img-x', '%');
    syncVar('in-img-y', 'val-img-y', '--img-y', '%');
    syncVar('in-slash-angle', 'val-angle', '--slash-angle', 'deg');
    syncVar('in-slash-pos', 'val-pos', '--slash-pos', '%');

    const cp = document.getElementById('in-color');
    const hx = document.getElementById('in-hex');
    const updateColor = (val) => {
        if (/^#[0-9A-F]{6}$/i.test(val)) {
            root.style.setProperty('--accent-color', val);
            cp.value = val; hx.value = val;
        }
    };
    cp.addEventListener('input', (e) => updateColor(e.target.value));
    hx.addEventListener('input', (e) => updateColor(e.target.value.startsWith('#') ? e.target.value : '#' + e.target.value));

    syncText('in-quote', 'out-quote');
    syncText('in-info', 'out-info');
    syncText('in-skill', 'out-skill');
    
    syncDisplay('toggle-quote', 'out-quote');
    syncDisplay('toggle-info', 'out-info');
    syncDisplay('toggle-skill', 'out-skill');

    document.getElementById('in-quote-size').addEventListener('input', (e) => { 
        document.getElementById('out-quote').style.fontSize = `${e.target.value}px`; 
        document.getElementById('val-quote-size').innerText = `${e.target.value}px`;
    });
    document.getElementById('in-info-size').addEventListener('input', (e) => { 
        document.getElementById('out-info').style.fontSize = `${e.target.value}px`; 
        document.getElementById('val-info-size').innerText = `${e.target.value}px`;
    });
    document.getElementById('in-skill-size').addEventListener('input', (e) => { 
        document.getElementById('out-skill').style.fontSize = `${e.target.value}px`; 
        document.getElementById('val-skill-size').innerText = `${e.target.value}px`;
    });

    function loadImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('uploaded-img').src = e.target.result;
                document.getElementById('uploaded-img').style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    function saveAsImage() {
        const captureDiv = document.getElementById('capture-area');
        const prevTransform = captureDiv.style.transform;
        captureDiv.style.transform = 'scale(1)'; 

        html2canvas(captureDiv, { 
            backgroundColor: '#111', 
            scale: 2, 
            useCORS: true,
            logging: false
        }).then(canvas => {
            captureDiv.style.transform = prevTransform; 
            const link = document.createElement('a');
            link.download = 'skill_cutin_' + new Date().getTime() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>

</body>
</html>
